<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <div class="hero-inner">
          <span class="eyebrow">Organize your day</span>
          <h1>To-Do List</h1>
          <p class="subtitle">
            Add, edit, or delete tasks with a clean and modern interface.
          </p>
          <form class="todo-form">
            <input type="text" id="todo-input" placeholder="Enter a task..." />
            <button type="button" id="add-btn">Add Task</button>
          </form>
        </div>
      </header>

      <main class="content">
        <section class="todo-panel">
          <div class="panel-header">
            <h2>Tasks</h2>
            <div class="panel-actions">
              <span class="task-count" id="task-count">0 items</span>
              <button id="clear-btn" class="clear-btn">Clear All</button>
            </div>
          </div>

          <ul id="todo-list" class="todo-list">
            <li class="empty-state">
              No tasks yet. Add your first task above.
            </li>
          </ul>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
